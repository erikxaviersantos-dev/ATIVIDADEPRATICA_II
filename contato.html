<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Contato - TechNova</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/mamacogenio.jfif">
</head>

<body>

    <nav class="menu-principal">
        <a href="index.html">Início</a>
        <a href="servicos.html">Serviços</a>
    </nav>

    <div class="cabecalho-pagina">
        <h1 id="titulo-destaque">Fale com a TechNova</h1>
    </div>

    <form action="#" method="POST" id="form-contato">
        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" name="nome" required>

        <label for="email">E-mail :</label>
        <input type="email" id="email" name="email" required>

        <label for="tipo_servico">Serviços Disponiveis:</label>
        <select id="tipo_servico" name="tipo_servico" required>
            <option value="">Selecione uma opção...</option>
            <option value="web">Desenvolvimento Web</option>
            <option value="consultoria">Consultoria de TI</option>
            <option value="suporte">Suporte Técnico</option>
        </select>

        <label for="mensagem">Sua Mensagem:</label>
        <textarea id="mensagem" name="mensagem" rows="6" required></textarea>

        <button type="submit" class="botao-enviar">Enviar Mensagem</button>
    </form>

</body>

</html>
